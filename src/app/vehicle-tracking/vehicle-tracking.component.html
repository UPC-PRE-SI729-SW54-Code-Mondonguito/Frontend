<div class="vehicle-tracking-container">
  <mat-toolbar color="primary">
    <span>Seguimiento y Alarmas de Vehículos</span>
    <span class="spacer"></span>
    <button mat-raised-button color="accent" routerLink="/dashboard-driver">Volver al Inicio</button>
  </mat-toolbar>

  <div class="content">
    <div class="left-section">
      <mat-card class="welcome-card">
        <div class="card-header">
          <h1>Bienvenido...</h1>
        </div>
      </mat-card>

      <mat-card class="tracking-card">
        <h2>Automóviles Registrados</h2>
        <p>(Automóviles con el sensor)</p>
      </mat-card>

      <mat-card class="tracking-card">
        <h2>Últimas alertas registradas</h2>
        <p>Historial de alertas</p>
      </mat-card>
    </div>

    <div class="right-section">
      <mat-card class="sensor-card">
        <h2>Mantenga su carro seguro con...</h2>
        <p>Explicación del sensor y su funcionamiento.</p>
      </mat-card>
    </div>
  </div>
</div>
